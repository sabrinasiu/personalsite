<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Sabrina Siu — Work</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Courier New", Courier, monospace;
      font-size: 14px;
      color: #9b8ec4;
      background: #ffffff;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    nav {
      display: flex;
      gap: 24px;
      padding: 28px 28px 0;
      margin-bottom: 2em;
    }

    nav a { opacity: 0.45; }
    nav a.active { opacity: 1; text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 2px; }
    nav a:hover { opacity: 0.75; }

    /* ── work grid ── */
    .work-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 0 8px 8px;
    }

    .work-item {
      display: block;
      position: relative;
      aspect-ratio: 16 / 10;
      border-radius: 12px;
      overflow: hidden;
      background: #f0f0f0;
      cursor: pointer;
    }

    .work-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 400ms ease;
    }

    .work-item:hover img { transform: scale(1.03); }

    /* framed: image centered in a gray card */
    .work-item.framed {
      background: #f2f2f0;
      aspect-ratio: 9 / 8;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .work-item.framed img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto !important;
      border-radius: 12px;
      border: 1px solid #000;
      transform: none !important;
    }

    .work-item.framed.portrait img {
      max-height: 78%;
    }

    .work-item.framed:hover img { transform: none !important; }

    /* filled: image contained within a colored card, no padding */
    .work-item.filled {
      background: #f5a9bc;
      aspect-ratio: 9 / 8;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .work-item.filled img {
      max-width: 85%;
      max-height: 85%;
      width: auto;
      height: auto;
      object-fit: contain;
    }


    .work-item-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px 18px 16px;
      background: linear-gradient(transparent, rgba(0,0,0,0.45));
      color: #fff;
      font-size: 13px;
      letter-spacing: 0.04em;
      opacity: 0;
      transition: opacity 300ms ease;
    }

    .work-item:hover .work-item-label { opacity: 1; }

    .work-item.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px dashed #d0cce8;
      background: #fafafa;
      color: #c0bcd8;
      font-size: 13px;
      letter-spacing: 0.04em;
    }

    /* ── detail overlay ── */
    #detail-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(10px);
      z-index: 50;
    }

    #detail-panel {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 51;
      width: min(860px, 88vw);
      flex-direction: column;
      gap: 20px;
    }

    #detail-panel img {
      width: 100%;
      max-height: 60vh;
      object-fit: contain;
      border-radius: 10px;
      display: block;
    }

    #detail-title {
      font-size: 15px;
      letter-spacing: 0.04em;
      color: #9b8ec4;
    }

    #detail-desc {
      font-size: 13px;
      line-height: 1.75;
      color: #b5aed4;
      max-width: 600px;
    }

    #detail-desc p + p { margin-top: 1em; }

    #detail-close {
      display: none;
      position: fixed;
      top: 28px;
      right: 32px;
      background: none;
      border: none;
      font-family: inherit;
      font-size: 13px;
      color: #9b8ec4;
      cursor: pointer;
      opacity: 0.6;
      z-index: 52;
      letter-spacing: 0.04em;
    }

    #detail-close:hover { opacity: 1; }
  </style>
</head>
<body>

  <nav>
    <a href="index.html">home</a>
    <a href="work.html" class="active">work</a>
    <a href="personal.html">personal</a>
  </nav>

  <div class="work-grid" id="work-grid"></div>

  <div id="detail-backdrop"></div>
  <div id="detail-panel">
    <img id="detail-img" src="" alt=""/>
    <div id="detail-title"></div>
    <div id="detail-desc"></div>
  </div>
  <button id="detail-close">&#x2715; close</button>

  <script>
    // ═══════════════════════════════════════════════════
    // ADD YOUR PROJECTS HERE
    // Each entry:
    //   title       — project name
    //   cover       — path to cover image  (assets/work/filename.jpg)
    //   description — text shown in overlay
    // ═══════════════════════════════════════════════════
    var PROJECTS = [

      {
        title: "ScienceBox",
        cover: "assets/work/ScienceBox.png",
        detail: "assets/work/ScienceBox_img.webp",
        filled: true,
        description: [
          "Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.",
          "<a href=\"https://medium.com/spotify-design/designing-data-science-tools-at-spotify-c01347d5e85b\" target=\"_blank\">Read the full article on Medium →</a>"
        ]
      },

      {
        title: "Megaphone",
        cover: "assets/work/Megaphone_Upload.gif",
        framed: true,
        portrait: true,
        description: [
          "Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.",
          "Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum."
        ]
      },

      {
        title: "S4C",
        cover: "assets/work/S4C_Video_Upload.gif",
        framed: true,
        description: [
          "Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.",
          "Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum."
        ]
      },

      // {
      //   title: "Spotify Creators",
      //   cover: "assets/work/spotify-creators.jpg",
      //   description: "Description of the project goes here. What it is, your role, the outcome."
      // },

    ];

    var grid     = document.getElementById('work-grid');
    var backdrop = document.getElementById('detail-backdrop');
    var panel    = document.getElementById('detail-panel');
    var dImg     = document.getElementById('detail-img');
    var dTitle   = document.getElementById('detail-title');
    var dDesc    = document.getElementById('detail-desc');
    var closeBtn = document.getElementById('detail-close');

    // render grid
    if (PROJECTS.length === 0) {
      // show placeholder slots when no projects added yet
      for (var i = 0; i < 4; i++) {
        var empty = document.createElement('div');
        empty.className = 'work-item empty';
        empty.textContent = '+ add project';
        grid.appendChild(empty);
      }
    } else {
      PROJECTS.forEach(function(p) {
        var a = document.createElement('div');
        a.className = 'work-item' + (p.framed ? ' framed' : '') + (p.filled ? ' filled' : '') + (p.portrait ? ' portrait' : '');
        var imgHtml = '<img src="' + p.cover + '" alt="' + p.title + '">';
        a.innerHTML = imgHtml + '<div class="work-item-label">' + p.title + '</div>';
        a.addEventListener('click', function() { open(p); });
        grid.appendChild(a);
      });
    }

    function open(p) {
      dImg.src = p.detail || p.cover;
      dTitle.textContent = p.title;
      var desc = p.description || [];
      var paras = Array.isArray(desc) ? desc : [desc];
      dDesc.innerHTML = paras.map(function(t) { return '<p>' + t + '</p>'; }).join('');
      backdrop.style.display = 'block';
      panel.style.display = 'flex';
      closeBtn.style.display = 'block';
    }

    function close() {
      backdrop.style.display = 'none';
      panel.style.display = 'none';
      closeBtn.style.display = 'none';
    }

    backdrop.addEventListener('click', close);
    closeBtn.addEventListener('click', close);
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') close(); });
  </script>

</body>
</html>
